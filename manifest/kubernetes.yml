# ✅ ENTORNO LOCAL - Docker Desktop / Minikube
# ─────────────────────────────────────────────

# consultar versión de minikube
minikube version

# consultar si minikube esta en start o stop
minikube status

# iniciar clúster kubernetes
minikube start

# ingresar a la carpeta de los manifiestos de kubernetes (manifest)
cd manifest

# listar namespace
kubectl get namespace
kubectl get ns

# crear namespace
kubectl apply -f genesis-rodriguez-34-namespace.yml

# consultar namespace en uso | LINUX
kubectl config view --minify | grep namespace

# consultar namespace en uso | WINDOWS
kubectl config view --minify | findstr namespace

# cambiar namespace en uso a "genesis-rodriguez-34-namespace"
kubectl config set-context --current --namespace=genesis-rodriguez-34-namespace

# aplicar manifiestos en orden
kubectl apply -f genesis-rodriguez-34-secret.yml
kubectl apply -f genesis-rodriguez-34-configmap.yml
kubectl apply -f genesis-rodriguez-34-service.yml
kubectl apply -f genesis-rodriguez-34-deployment.yml

# consultar todos los recursos del namespace
kubectl get all -n genesis-rodriguez-34-namespace

# consultar todos los recursos y secret del namespace
kubectl get all,secrets -n genesis-rodriguez-34-namespace

# listar services
minikube service genesis-rodriguez-34-service -n genesis-rodriguez-34-namespace
minikube service list

# probar el microservicio dentro del clúster con curl
curl http://192.168.49.2:30001/api/v1/face-detection
curl http://192.168.49.2:30001/api/v1/face-analysis

# crear un túnel de puerto entre la máquina local (host) y el clúster de Kubernetes
kubectl port-forward service/genesis-rodriguez-34-service 8080:30001 -n genesis-rodriguez-34-namespace


